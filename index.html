<!DOCTYPE html>
<html>
<head>
    <title>Mi App de Notas 😎</title>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>📝 Mis Notas</h1>
        <div id="loginPanel" style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; width: 350px;">
            <div id="mensaje" style="margin-bottom: 10px; padding: 8px; border-radius: 4px; display: none;"></div>
            <div id="loginForm">
                <input type="text" id="loginUsuario" placeholder="Usuario" style="margin-right: 5px; width: 100px;">
                <input type="password" id="loginPassword" placeholder="Contraseña" style="margin-right: 5px; width: 100px;">
                <button onclick="login()" style="padding: 5px 10px;">Ingresar</button>
                <button onclick="toggleRegistro()" style="padding: 5px 10px;">Registrar</button>
            </div>
            <div id="registroForm" style="display: none; border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px;">
                <h3 style="margin-top: 0;">Crear Cuenta</h3>
                <input type="text" id="regUsuario" placeholder="Usuario" style="display: block; margin-bottom: 8px; width: 100%; padding: 5px; box-sizing: border-box;">
                <input type="password" id="regPassword" placeholder="Contraseña" style="display: block; margin-bottom: 8px; width: 100%; padding: 5px; box-sizing: border-box;">
                <button type="button" onclick="registrarNuevo()" style="padding: 8px 10px; width: 100%; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">Crear Cuenta</button>
                <button type="button" onclick="toggleRegistro()" style="padding: 8px 10px; width: 100%; margin-top: 5px; background-color: #6c757d; color: white; border: none; border-radius: 3px; cursor: pointer;">Volver</button>
            </div>
            <div id="usuarioLogueado" style="display: none;">
                <span id="usuarioNombre" style="font-weight: bold;"></span>
                <button onclick="logout()" style="margin-left: 10px;">Salir</button>
            </div>
        </div>
    </div>

    <input type="text" id="usuarioInput" placeholder="Tu nombre" style="margin-bottom: 10px;" disabled>
    <input type="text" id="notaInput" placeholder="Escribe una nota" disabled>
    <button onclick="agregarNota()" disabled id="btnAgregar">Agregar</button>

    <ul id="listaNotas"></ul>

    <script>
        let usuarioActual = null;
        let esAdmin = false;

        // Verificar si hay usuario guardado al cargar la página
        window.addEventListener('load', () => {
            const usuario = localStorage.getItem('usuarioActual');
            const admin = localStorage.getItem('esAdmin') === 'true';
            if (usuario) {
                usuarioActual = usuario;
                esAdmin = admin;
                mostrarUsuarioLogueado();
            }
            cargarNotas();
        });

        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const password = document.getElementById('loginPassword').value;

            if (!usuario || !password) {
                mostrarMensaje('❌ Ingresa usuario y contraseña', 'error');
                return;
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    mostrarMensaje('❌ Usuario y/o contraseña equivocada', 'error');
                    document.getElementById('loginPassword').value = '';
                    return;
                }

                usuarioActual = usuario;
                esAdmin = data.isAdmin || false;
                localStorage.setItem('usuarioActual', usuario);
                localStorage.setItem('esAdmin', esAdmin);
                mostrarMensaje('✅ Sesión iniciada correctamente', 'exito');
                
                setTimeout(() => {
                    document.getElementById('mensaje').style.display = 'none';
                    mostrarUsuarioLogueado();
                    cargarNotas();
                }, 1500);
            } catch (error) {
                console.error('Error en login:', error);
                mostrarMensaje('❌ Error al conectar', 'error');
            }
        }

        function toggleRegistro() {
            const loginForm = document.getElementById('loginForm');
            const registroForm = document.getElementById('registroForm');
            
            if (registroForm.style.display === 'none') {
                loginForm.style.display = 'none';
                registroForm.style.display = 'block';
                document.getElementById('regUsuario').focus();
            } else {
                loginForm.style.display = 'block';
                registroForm.style.display = 'none';
                document.getElementById('regUsuario').value = '';
                document.getElementById('regPassword').value = '';
            }
        }

        async function registrarNuevo() {
            const usuario = document.getElementById('regUsuario').value.trim();
            const password = document.getElementById('regPassword').value;

            console.log('Registrar:', usuario, password);

            if (!usuario) {
                mostrarMensaje('❌ El usuario no puede estar vacío', 'error');
                return;
            }

            if (!password) {
                mostrarMensaje('❌ La contraseña no puede estar vacía', 'error');
                return;
            }

            await registrar(usuario, password);
        }

        async function registrar(usuario, password) {
            try {
                console.log('Enviando registro a servidor:', usuario);
                const res = await fetch('/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await res.json();
                console.log('Respuesta del servidor:', res.status, data);

                if (!res.ok) {
                    mostrarMensaje('❌ ' + (data.error || 'Error al registrar'), 'error');
                    return;
                }

                mostrarMensaje('✅ Se registró correctamente. Inicie sesión con sus datos', 'exito');
                document.getElementById('loginUsuario').value = usuario;
                document.getElementById('loginPassword').value = '';
                document.getElementById('regUsuario').value = '';
                document.getElementById('regPassword').value = '';
                
                setTimeout(() => {
                    toggleRegistro();
                    document.getElementById('loginPassword').focus();
                    document.getElementById('mensaje').style.display = 'none';
                }, 2000);
            } catch (error) {
                console.error('Error en registro:', error);
                mostrarMensaje('❌ Error al conectar: ' + error.message, 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.textContent = texto;
            div.style.display = 'block';
            div.style.fontWeight = 'bold';

            if (tipo === 'exito') {
                div.style.backgroundColor = '#d4edda';
                div.style.color = '#155724';
                div.style.border = '1px solid #c3e6cb';
            } else if (tipo === 'error') {
                div.style.backgroundColor = '#f8d7da';
                div.style.color = '#721c24';
                div.style.border = '1px solid #f5c6cb';
            }
        }

        function logout() {
            usuarioActual = null;
            esAdmin = false;
            localStorage.removeItem('usuarioActual');
            localStorage.removeItem('esAdmin');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('usuarioLogueado').style.display = 'none';
            document.getElementById('loginUsuario').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('usuarioInput').disabled = true;
            document.getElementById('notaInput').disabled = true;
            document.getElementById('btnAgregar').disabled = true;
            document.getElementById('mensaje').style.display = 'none';
            cargarNotas();
        }

        function mostrarUsuarioLogueado() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('usuarioLogueado').style.display = 'block';
            
            let nombreTexto = `👤 ${usuarioActual}`;
            if (esAdmin) {
                nombreTexto += ' <span style="background-color: #FFD700; color: black; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 11px; margin-left: 5px;">🔑 Admin</span>';
            }
            document.getElementById('usuarioNombre').innerHTML = nombreTexto;
            document.getElementById('usuarioInput').disabled = false;
            document.getElementById('usuarioInput').value = usuarioActual;
            document.getElementById('notaInput').disabled = false;
            document.getElementById('btnAgregar').disabled = false;
        }

        async function agregarNota() {
            if (!usuarioActual) {
                alert('Debes iniciar sesión');
                return;
            }

            const input = document.getElementById('notaInput');

            if (!input.value.trim()) {
                alert('La nota no puede estar vacía');
                return;
            }

            try {
                const res = await fetch('/agregar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, texto: input.value })
                });

                if (!res.ok) {
                    const error = await res.json();
                    alert('Error: ' + error.error);
                    return;
                }

                input.value = '';
                cargarNotas();
            } catch (error) {
                console.error('Error al agregar nota:', error);
                alert('Error al conectar con el servidor');
            }
        }

        async function cargarNotas() {
            try {
                const res = await fetch('/notas');
                
                if (!res.ok) {
                    console.error('Error al obtener notas:', res.status);
                    return;
                }

                const notas = await res.json();

                const lista = document.getElementById('listaNotas');
                lista.innerHTML = '';

                if (!Array.isArray(notas) || notas.length === 0) {
                    lista.innerHTML = '<li style="color: gray;">No hay notas aún</li>';
                    return;
                }

                notas.forEach((nota, index) => {
                    const li = document.createElement('li');
                    li.style.marginBottom = '15px';
                    li.style.padding = '10px';
                    li.style.backgroundColor = '#f5f5f5';
                    li.style.borderRadius = '5px';

                    const usuario = document.createElement('div');
                    usuario.textContent = `👤 ${nota.usuario}`;
                    usuario.style.fontWeight = 'bold';
                    usuario.style.marginBottom = '5px';
                    usuario.style.color = '#666';

                    const texto = document.createElement('span');
                    texto.textContent = nota.texto;

                    const btnEliminar = document.createElement('button');
                    btnEliminar.textContent = '❌';
                    btnEliminar.style.marginLeft = '10px';

                    // Mostrar botón si es admin O si es el propietario
                    if (usuarioActual && (esAdmin || usuarioActual === nota.usuario)) {
                        btnEliminar.onclick = async () => {
                            if (!confirm('¿Eliminar nota?')) return;

                            try {
                                const res = await fetch(`/eliminar/${index}`, {
                                    method: 'DELETE',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ usuario: usuarioActual, isAdmin: esAdmin })
                                });

                                if (!res.ok) {
                                    const error = await res.json();
                                    alert('Error: ' + error.error);
                                    return;
                                }

                                cargarNotas();
                            } catch (error) {
                                console.error('Error al eliminar:', error);
                                alert('Error al eliminar la nota');
                            }
                        };
                    } else {
                        btnEliminar.style.display = 'none';
                    }

                    const btnEditar = document.createElement('button');
                    btnEditar.textContent = '✏️';
                    btnEditar.style.marginLeft = '10px';

                    if (usuarioActual && usuarioActual === nota.usuario) {
                        btnEditar.onclick = async () => {
                            const nuevoTexto = prompt('Editar nota:', nota.texto);

                            if (nuevoTexto) {
                                try {
                                    const res = await fetch(`/editar/${index}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ usuario: usuarioActual, texto: nuevoTexto })
                                    });

                                    if (!res.ok) {
                                        const error = await res.json();
                                        alert('Error: ' + error.error);
                                        return;
                                    }

                                    cargarNotas();
                                } catch (error) {
                                    console.error('Error al editar:', error);
                                    alert('Error al editar la nota');
                                }
                            }
                        };
                    } else {
                        btnEditar.style.display = 'none';
                    }

                    li.appendChild(usuario);
                    li.appendChild(texto);
                    li.appendChild(btnEliminar);
                    li.appendChild(btnEditar);

                    lista.appendChild(li);
                });
            } catch (error) {
                console.error('Error al cargar notas:', error);
            }
        }
    </script>
