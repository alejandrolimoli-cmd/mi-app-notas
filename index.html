<!DOCTYPE html>
<html>
<head>
    <title>Mi App de Notas 😎</title>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>📝 Mis Notas</h1>
        <div id="loginPanel" style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; width: 350px;">
            <div id="mensaje" style="margin-bottom: 10px; padding: 8px; border-radius: 4px; display: none;"></div>
            <div id="loginForm">
                <input type="text" id="loginUsuario" placeholder="Usuario" style="margin-right: 5px; width: 100px;">
                <input type="password" id="loginPassword" placeholder="Contraseña" style="margin-right: 5px; width: 100px;">
                <button onclick="login()" style="padding: 5px 10px;">Ingresar</button>
                <button onclick="toggleRegistro()" style="padding: 5px 10px;">Registrar</button>
            </div>
            <div id="registroForm" style="display: none; border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px;">
                <h3 style="margin-top: 0;">Crear Cuenta</h3>
                <input type="text" id="regUsuario" placeholder="Usuario" style="display: block; margin-bottom: 8px; width: 100%; padding: 5px; box-sizing: border-box;">
                <input type="password" id="regPassword" placeholder="Contraseña" style="display: block; margin-bottom: 8px; width: 100%; padding: 5px; box-sizing: border-box;">
                <button type="button" onclick="registrarNuevo()" style="padding: 8px 10px; width: 100%; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">Crear Cuenta</button>
                <button type="button" onclick="toggleRegistro()" style="padding: 8px 10px; width: 100%; margin-top: 5px; background-color: #6c757d; color: white; border: none; border-radius: 3px; cursor: pointer;">Volver</button>
            </div>
            <div id="usuarioLogueado" style="display: none;">
                <span id="usuarioNombre" style="font-weight: bold;"></span>
                <button onclick="logout()" style="margin-left: 10px;">Salir</button>
            </div>
        </div>
    </div>

    <!-- TABS para cambiar entre Mis Notas y Mis Grupos -->
    <div id="gruposTab" style="display: none; margin-top: 20px;">
        <h2>📁 Mis Grupos</h2>
        <div style="margin-bottom: 15px;">
            <button onclick="toggleCrearGrupo()" style="padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer;">➕ Crear Grupo</button>
            <button onclick="toggleUnirseGrupo()" style="padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin-left: 5px;">🔗 Unirse a Grupo</button>
        </div>

        <!-- Formulario crear grupo -->
        <div id="crearGrupoForm" style="display: none; border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px;">
            <h3>Crear Nuevo Grupo</h3>
            <input type="text" id="nombreGrupo" placeholder="Nombre del grupo" style="width: 300px; padding: 5px; margin-right: 5px;">
            <button onclick="crearGrupo()" style="padding: 5px 15px; background-color: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer;">Crear</button>
            <button onclick="toggleCrearGrupo()" style="padding: 5px 15px; background-color: #ccc; color: black; border: none; border-radius: 3px; cursor: pointer; margin-left: 5px;">Cancelar</button>
        </div>

        <!-- Formulario unirse a grupo -->
        <div id="unirseGrupoForm" style="display: none; border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px;">
            <h3>Unirse a un Grupo</h3>
            <input type="text" id="codigoGrupo" placeholder="Código de invitación" style="width: 300px; padding: 5px; margin-right: 5px;">
            <button onclick="unirseGrupo()" style="padding: 5px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer;">Unirse</button>
            <button onclick="toggleUnirseGrupo()" style="padding: 5px 15px; background-color: #ccc; color: black; border: none; border-radius: 3px; cursor: pointer; margin-left: 5px;">Cancelar</button>
        </div>

        <!-- Lista de grupos -->
        <div id="listaGrupos"></div>

        <!-- VISTA DEL GRUPO ABIERTO -->
        <div id="vistaGrupo" style="display: none; margin-top: 20px; border: 2px solid #007bff; padding: 15px; border-radius: 5px; background-color: #f0f7ff;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="nombreGrupoVista">📁 Nombre del Grupo</h2>
                <button onclick="cerrarGrupo()" style="padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 3px; cursor: pointer;">← Volver a Grupos</button>
            </div>
            
            <input type="text" id="notaGrupoInput" placeholder="Escribe una nota para el grupo" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 3px;">
            <button onclick="agregarNotaGrupo()" style="padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; margin-bottom: 15px;">➕ Agregar Nota al Grupo</button>
            
            <div id="listaNotasGrupo"></div>
        </div>
    </div>

    <!-- TAB de Mis Notas -->
    <div id="notasTab">
        <h2>📝 Mis Notas Personales</h2>
        <input type="text" id="usuarioInput" placeholder="Tu nombre" style="margin-bottom: 10px;" disabled>
        <input type="text" id="notaInput" placeholder="Escribe una nota" disabled>
        <button onclick="agregarNota()" disabled id="btnAgregar">Agregar</button>
        <ul id="listaNotas"></ul>
    </div>

    <script>
        let usuarioActual = null;
        let esAdmin = false;
        let grupoActual = null;

        // Verificar si hay usuario guardado al cargar la página
        window.addEventListener('load', () => {
            const usuario = localStorage.getItem('usuarioActual');
            const admin = localStorage.getItem('esAdmin') === 'true';
            if (usuario) {
                usuarioActual = usuario;
                esAdmin = admin;
                mostrarUsuarioLogueado();
            }
            cargarNotas();
        });

        async function login() {
            const usuario = document.getElementById('loginUsuario').value;
            const password = document.getElementById('loginPassword').value;

            if (!usuario || !password) {
                mostrarMensaje('❌ Ingresa usuario y contraseña', 'error');
                return;
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    mostrarMensaje('❌ Usuario y/o contraseña equivocada', 'error');
                    document.getElementById('loginPassword').value = '';
                    return;
                }

                usuarioActual = usuario;
                esAdmin = data.isAdmin || false;
                localStorage.setItem('usuarioActual', usuario);
                localStorage.setItem('esAdmin', esAdmin);
                mostrarMensaje('✅ Sesión iniciada correctamente', 'exito');
                
                setTimeout(() => {
                    document.getElementById('mensaje').style.display = 'none';
                    mostrarUsuarioLogueado();
                    cargarNotas();
                }, 1500);
            } catch (error) {
                console.error('Error en login:', error);
                mostrarMensaje('❌ Error al conectar', 'error');
            }
        }

        function toggleRegistro() {
            const loginForm = document.getElementById('loginForm');
            const registroForm = document.getElementById('registroForm');
            
            if (registroForm.style.display === 'none') {
                loginForm.style.display = 'none';
                registroForm.style.display = 'block';
                document.getElementById('regUsuario').focus();
            } else {
                loginForm.style.display = 'block';
                registroForm.style.display = 'none';
                document.getElementById('regUsuario').value = '';
                document.getElementById('regPassword').value = '';
            }
        }

        async function registrarNuevo() {
            const usuario = document.getElementById('regUsuario').value.trim();
            const password = document.getElementById('regPassword').value;

            console.log('Registrar:', usuario, password);

            if (!usuario) {
                mostrarMensaje('❌ El usuario no puede estar vacío', 'error');
                return;
            }

            if (!password) {
                mostrarMensaje('❌ La contraseña no puede estar vacía', 'error');
                return;
            }

            await registrar(usuario, password);
        }

        async function registrar(usuario, password) {
            try {
                console.log('Enviando registro a servidor:', usuario);
                const res = await fetch('/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await res.json();
                console.log('Respuesta del servidor:', res.status, data);

                if (!res.ok) {
                    mostrarMensaje('❌ ' + (data.error || 'Error al registrar'), 'error');
                    return;
                }

                mostrarMensaje('✅ Se registró correctamente. Inicie sesión con sus datos', 'exito');
                document.getElementById('loginUsuario').value = usuario;
                document.getElementById('loginPassword').value = '';
                document.getElementById('regUsuario').value = '';
                document.getElementById('regPassword').value = '';
                
                setTimeout(() => {
                    toggleRegistro();
                    document.getElementById('loginPassword').focus();
                    document.getElementById('mensaje').style.display = 'none';
                }, 2000);
            } catch (error) {
                console.error('Error en registro:', error);
                mostrarMensaje('❌ Error al conectar: ' + error.message, 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.textContent = texto;
            div.style.display = 'block';
            div.style.fontWeight = 'bold';

            if (tipo === 'exito') {
                div.style.backgroundColor = '#d4edda';
                div.style.color = '#155724';
                div.style.border = '1px solid #c3e6cb';
            } else if (tipo === 'error') {
                div.style.backgroundColor = '#f8d7da';
                div.style.color = '#721c24';
                div.style.border = '1px solid #f5c6cb';
            }
        }

        function logout() {
            usuarioActual = null;
            esAdmin = false;
            localStorage.removeItem('usuarioActual');
            localStorage.removeItem('esAdmin');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('usuarioLogueado').style.display = 'none';
            document.getElementById('loginUsuario').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('usuarioInput').disabled = true;
            document.getElementById('notaInput').disabled = true;
            document.getElementById('btnAgregar').disabled = true;
            document.getElementById('mensaje').style.display = 'none';
            cargarNotas();
        }

        function mostrarUsuarioLogueado() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('usuarioLogueado').style.display = 'block';
            
            let nombreTexto = `👤 ${usuarioActual}`;
            if (esAdmin) {
                nombreTexto += ' <span style="background-color: #FFD700; color: black; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 11px; margin-left: 5px;">🔑 Admin</span>';
            }
            document.getElementById('usuarioNombre').innerHTML = nombreTexto;
            document.getElementById('usuarioInput').disabled = false;
            document.getElementById('usuarioInput').value = usuarioActual;
            document.getElementById('notaInput').disabled = false;
            document.getElementById('btnAgregar').disabled = false;
            document.getElementById('gruposTab').style.display = 'block';
            cargarGrupos();
        }

        async function agregarNota() {
            if (!usuarioActual) {
                alert('Debes iniciar sesión');
                return;
            }

            const input = document.getElementById('notaInput');

            if (!input.value.trim()) {
                alert('La nota no puede estar vacía');
                return;
            }

            try {
                const res = await fetch('/agregar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, texto: input.value })
                });

                if (!res.ok) {
                    const error = await res.json();
                    alert('Error: ' + error.error);
                    return;
                }

                input.value = '';
                cargarNotas();
            } catch (error) {
                console.error('Error al agregar nota:', error);
                alert('Error al conectar con el servidor');
            }
        }

        async function cargarNotas() {
            try {
                const res = await fetch('/notas');
                
                if (!res.ok) {
                    console.error('Error al obtener notas:', res.status);
                    return;
                }

                const notas = await res.json();

                const lista = document.getElementById('listaNotas');
                lista.innerHTML = '';

                if (!Array.isArray(notas) || notas.length === 0) {
                    lista.innerHTML = '<li style="color: gray;">No hay notas aún</li>';
                    return;
                }

                notas.forEach((nota, index) => {
                    const li = document.createElement('li');
                    li.style.marginBottom = '15px';
                    li.style.padding = '10px';
                    li.style.backgroundColor = '#f5f5f5';
                    li.style.borderRadius = '5px';

                    const usuario = document.createElement('div');
                    usuario.textContent = `👤 ${nota.usuario}`;
                    usuario.style.fontWeight = 'bold';
                    usuario.style.marginBottom = '5px';
                    usuario.style.color = '#666';

                    const texto = document.createElement('span');
                    texto.textContent = nota.texto;

                    const btnEliminar = document.createElement('button');
                    btnEliminar.textContent = '❌';
                    btnEliminar.style.marginLeft = '10px';

                    // Mostrar botón si es admin O si es el propietario
                    if (usuarioActual && (esAdmin || usuarioActual === nota.usuario)) {
                        btnEliminar.onclick = async () => {
                            if (!confirm('¿Eliminar nota?')) return;

                            try {
                                const res = await fetch(`/eliminar/${index}`, {
                                    method: 'DELETE',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ usuario: usuarioActual, isAdmin: esAdmin })
                                });

                                if (!res.ok) {
                                    const error = await res.json();
                                    alert('Error: ' + error.error);
                                    return;
                                }

                                cargarNotas();
                            } catch (error) {
                                console.error('Error al eliminar:', error);
                                alert('Error al eliminar la nota');
                            }
                        };
                    } else {
                        btnEliminar.style.display = 'none';
                    }

                    const btnEditar = document.createElement('button');
                    btnEditar.textContent = '✏️';
                    btnEditar.style.marginLeft = '10px';

                    if (usuarioActual && usuarioActual === nota.usuario) {
                        btnEditar.onclick = async () => {
                            const nuevoTexto = prompt('Editar nota:', nota.texto);

                            if (nuevoTexto) {
                                try {
                                    const res = await fetch(`/editar/${index}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ usuario: usuarioActual, texto: nuevoTexto })
                                    });

                                    if (!res.ok) {
                                        const error = await res.json();
                                        alert('Error: ' + error.error);
                                        return;
                                    }

                                    cargarNotas();
                                } catch (error) {
                                    console.error('Error al editar:', error);
                                    alert('Error al editar la nota');
                                }
                            }
                        };
                    } else {
                        btnEditar.style.display = 'none';
                    }

                    li.appendChild(usuario);
                    li.appendChild(texto);
                    li.appendChild(btnEliminar);
                    li.appendChild(btnEditar);

                    lista.appendChild(li);
                });
            } catch (error) {
                console.error('Error al cargar notas:', error);
            }
        }

        // ===== FUNCIONES DE GRUPOS =====

        function toggleCrearGrupo() {
            const form = document.getElementById('crearGrupoForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function toggleUnirseGrupo() {
            const form = document.getElementById('unirseGrupoForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function crearGrupo() {
            const nombre = document.getElementById('nombreGrupo').value.trim();

            if (!nombre) {
                alert('El nombre del grupo no puede estar vacío');
                return;
            }

            try {
                const res = await fetch('/crear-grupo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, nombreGrupo: nombre })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert('Error: ' + data.error);
                    return;
                }

                mostrarMensaje(`✅ Grupo creado. Código: ${data.codigo}`, 'exito');
                document.getElementById('nombreGrupo').value = '';
                toggleCrearGrupo();
                cargarGrupos();
            } catch (error) {
                console.error('Error al crear grupo:', error);
                alert('Error al crear grupo');
            }
        }

        async function unirseGrupo() {
            const codigo = document.getElementById('codigoGrupo').value.trim();

            if (!codigo) {
                alert('Ingresa el código de invitación');
                return;
            }

            try {
                const res = await fetch('/unirse-grupo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, codigo })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert('Error: ' + data.error);
                    return;
                }

                mostrarMensaje(`✅ Te uniste a: ${data.grupo}`, 'exito');
                document.getElementById('codigoGrupo').value = '';
                toggleUnirseGrupo();
                cargarGrupos();
            } catch (error) {
                console.error('Error al unirse a grupo:', error);
                alert('Error al unirse al grupo');
            }
        }

        async function cargarGrupos() {
            try {
                const res = await fetch(`/mis-grupos/${usuarioActual}`);
                
                if (!res.ok) {
                    console.error('Error al obtener grupos:', res.status);
                    return;
                }

                const grupos = await res.json();
                const lista = document.getElementById('listaGrupos');
                lista.innerHTML = '';

                if (!Array.isArray(grupos) || grupos.length === 0) {
                    lista.innerHTML = '<p style="color: gray;">No tienes grupos aún</p>';
                    return;
                }

                grupos.forEach(grupo => {
                    const div = document.createElement('div');
                    div.style.border = '1px solid #ddd';
                    div.style.padding = '12px';
                    div.style.marginBottom = '10px';
                    div.style.borderRadius = '5px';
                    div.style.backgroundColor = '#f9f9f9';

                    const header = document.createElement('div');
                    header.style.display = 'flex';
                    header.style.justifyContent = 'space-between';
                    header.style.alignItems = 'center';
                    header.style.marginBottom = '10px';

                    const title = document.createElement('h3');
                    title.textContent = `📁 ${grupo.nombre}`;
                    title.style.margin = '0';

                    const badge = document.createElement('span');
                    badge.textContent = `${grupo.notasCount} notas`;
                    badge.style.backgroundColor = '#007bff';
                    badge.style.color = 'white';
                    badge.style.padding = '3px 8px';
                    badge.style.borderRadius = '3px';
                    badge.style.fontSize = '12px';

                    header.appendChild(title);
                    header.appendChild(badge);

                    const info = document.createElement('div');
                    info.style.fontSize = '12px';
                    info.style.color = '#666';
                    info.textContent = `Creador: ${grupo.creador} | Miembros: ${grupo.miembros.length}`;

                    const codigo = document.createElement('div');
                    codigo.style.fontSize = '11px';
                    codigo.style.color = '#999';
                    codigo.style.marginTop = '5px';
                    codigo.textContent = `📌 Código: ${grupo.codigo}`;

                    const btnAbrir = document.createElement('button');
                    btnAbrir.textContent = '👁️ Ver Notas';
                    btnAbrir.onclick = () => abrirGrupo(grupo.id, grupo.nombre);
                    btnAbrir.style.padding = '5px 10px';
                    btnAbrir.style.backgroundColor = '#007bff';
                    btnAbrir.style.color = 'white';
                    btnAbrir.style.border = 'none';
                    btnAbrir.style.borderRadius = '3px';
                    btnAbrir.style.cursor = 'pointer';
                    btnAbrir.style.marginTop = '10px';
                    btnAbrir.style.marginRight = '5px';

                    div.appendChild(header);
                    div.appendChild(info);
                    div.appendChild(codigo);
                    div.appendChild(btnAbrir);

                    lista.appendChild(div);
                });
            } catch (error) {
                console.error('Error al cargar grupos:', error);
            }
        }

        async function abrirGrupo(grupoId, nombreGrupo) {
            grupoActual = grupoId;
            document.getElementById('gruposTab').style.display = 'none';
            document.getElementById('notasTab').style.display = 'none';
            document.getElementById('vistaGrupo').style.display = 'block';
            document.getElementById('nombreGrupoVista').textContent = `📁 ${nombreGrupo}`;
            document.getElementById('notaGrupoInput').focus();
            
            await cargarNotasGrupo();
        }

        function cerrarGrupo() {
            grupoActual = null;
            document.getElementById('vistaGrupo').style.display = 'none';
            document.getElementById('notasTab').style.display = 'block';
            document.getElementById('gruposTab').style.display = 'block';
            document.getElementById('notaGrupoInput').value = '';
        }

        async function cargarNotasGrupo() {
            if (!grupoActual) return;

            try {
                const res = await fetch(`/grupo/${grupoActual}/notas`);
                
                if (!res.ok) {
                    console.error('Error al obtener notas del grupo:', res.status);
                    return;
                }

                const notas = await res.json();
                const lista = document.getElementById('listaNotasGrupo');
                lista.innerHTML = '';

                if (!Array.isArray(notas) || notas.length === 0) {
                    lista.innerHTML = '<p style="color: gray;">No hay notas en este grupo aún</p>';
                    return;
                }

                notas.forEach((nota, index) => {
                    const li = document.createElement('li');
                    li.style.marginBottom = '15px';
                    li.style.padding = '10px';
                    li.style.backgroundColor = '#fff';
                    li.style.borderRadius = '5px';
                    li.style.border = '1px solid #ddd';

                    const usuario = document.createElement('div');
                    usuario.textContent = `👤 ${nota.usuario}`;
                    usuario.style.fontWeight = 'bold';
                    usuario.style.marginBottom = '5px';
                    usuario.style.color = '#666';

                    const texto = document.createElement('span');
                    texto.textContent = nota.texto;

                    const btnEliminar = document.createElement('button');
                    btnEliminar.textContent = '❌';
                    btnEliminar.style.marginLeft = '10px';
                    btnEliminar.style.padding = '2px 8px';
                    btnEliminar.style.cursor = 'pointer';

                    // Mostrar botón si es admin O si es el propietario
                    if (usuarioActual && (esAdmin || usuarioActual === nota.usuario)) {
                        btnEliminar.onclick = async () => {
                            if (!confirm('¿Eliminar nota?')) return;

                            try {
                                const res = await fetch(`/grupo/${grupoActual}/eliminar/${nota.id}`, {
                                    method: 'DELETE',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ usuario: usuarioActual, isAdmin: esAdmin })
                                });

                                if (!res.ok) {
                                    const error = await res.json();
                                    alert('Error: ' + error.error);
                                    return;
                                }

                                cargarNotasGrupo();
                            } catch (error) {
                                console.error('Error al eliminar:', error);
                                alert('Error al eliminar la nota');
                            }
                        };
                    } else {
                        btnEliminar.style.display = 'none';
                    }

                    const btnEditar = document.createElement('button');
                    btnEditar.textContent = '✏️';
                    btnEditar.style.marginLeft = '5px';
                    btnEditar.style.padding = '2px 8px';
                    btnEditar.style.cursor = 'pointer';

                    if (usuarioActual && usuarioActual === nota.usuario) {
                        btnEditar.onclick = async () => {
                            const nuevoTexto = prompt('Editar nota:', nota.texto);

                            if (nuevoTexto) {
                                try {
                                    const res = await fetch(`/grupo/${grupoActual}/editar/${nota.id}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ usuario: usuarioActual, texto: nuevoTexto })
                                    });

                                    if (!res.ok) {
                                        const error = await res.json();
                                        alert('Error: ' + error.error);
                                        return;
                                    }

                                    cargarNotasGrupo();
                                } catch (error) {
                                    console.error('Error al editar:', error);
                                    alert('Error al editar la nota');
                                }
                            }
                        };
                    } else {
                        btnEditar.style.display = 'none';
                    }

                    li.appendChild(usuario);
                    li.appendChild(texto);
                    li.appendChild(btnEliminar);
                    li.appendChild(btnEditar);

                    lista.appendChild(li);
                });
            } catch (error) {
                console.error('Error al cargar notas del grupo:', error);
            }
        }

        async function agregarNotaGrupo() {
            const input = document.getElementById('notaGrupoInput');

            if (!input.value.trim()) {
                alert('La nota no puede estar vacía');
                return;
            }

            try {
                const res = await fetch(`/grupo/${grupoActual}/agregar-nota`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, texto: input.value })
                });

                if (!res.ok) {
                    const error = await res.json();
                    alert('Error: ' + error.error);
                    return;
                }

                input.value = '';
                input.focus();
                cargarNotasGrupo();
            } catch (error) {
                console.error('Error al agregar nota al grupo:', error);
                alert('Error al conectar con el servidor');
            }
        }
    </script>
